ori_var = 'default'
# We import sub config to overwrite ori_var & make new_var definition!
> ./test/test_properties/dummy_sub_cfg.ini

# recursively loading subconfig, 
#   wrap a section name, so it'll not overwirte dummy_sub_cfg content!
> ./test/test_properties/recur_sub_cfg.ini

[hier_sec]
    # subconfig can also contains hierachical config
    > ./test/test_properties/hier_cfg.ini

# add (overwrite) a new var in previous imported recur_sub_cfg config!
[overwrite_sec]
    ori_var = 'default' 
    # override with subconfig 2 times!
    > ./test/test_properties/dummy_sub_cfg.ini